<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#000814"/>
  <!-- Graduation cap body -->
  <polygon points="96,44 160,76 96,108 32,76" fill="#F0CB46"/>
  <!-- Cap top highlight -->
  <polygon points="96,44 160,76 96,88 32,76" fill="#CCA000" opacity="0.5"/>
  <!-- Left side of mortarboard square top -->
  <rect x="84" y="36" width="24" height="12" rx="2" fill="#F0CB46"/>
  <!-- Tassel -->
  <line x1="160" y1="76" x2="160" y2="105" stroke="#F0CB46" stroke-width="4" stroke-linecap="round"/>
  <circle cx="160" cy="108" r="5" fill="#F0CB46"/>
  <!-- Book stand (pillar) -->
  <rect x="88" y="108" width="16" height="32" rx="3" fill="#003566"/>
  <!-- Open book at bottom -->
  <rect x="60" y="140" width="72" height="14" rx="4" fill="#F0CB46"/>
  <line x1="96" y1="140" x2="96" y2="154" stroke="#CCA000" stroke-width="2"/>
</svg>
