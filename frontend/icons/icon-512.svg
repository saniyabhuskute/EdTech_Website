<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#000814"/>
  <!-- Graduation cap body -->
  <polygon points="256,110 430,200 256,290 82,200" fill="#F0CB46"/>
  <!-- Cap top highlight -->
  <polygon points="256,110 430,200 256,240 82,200" fill="#CCA000" opacity="0.5"/>
  <!-- Cap square top -->
  <rect x="222" y="94" width="68" height="32" rx="6" fill="#F0CB46"/>
  <!-- Tassel string -->
  <line x1="430" y1="200" x2="430" y2="276" stroke="#F0CB46" stroke-width="10" stroke-linecap="round"/>
  <circle cx="430" cy="290" r="14" fill="#F0CB46"/>
  <!-- Pillar -->
  <rect x="232" y="290" width="48" height="86" rx="8" fill="#003566"/>
  <!-- Open book base -->
  <rect x="152" y="376" width="208" height="40" rx="12" fill="#F0CB46"/>
  <line x1="256" y1="376" x2="256" y2="416" stroke="#CCA000" stroke-width="5"/>
  <!-- Stars -->
  <circle cx="150" cy="140" r="8" fill="#F0CB46" opacity="0.4"/>
  <circle cx="360" cy="120" r="6" fill="#F0CB46" opacity="0.3"/>
  <circle cx="390" cy="350" r="5" fill="#F0CB46" opacity="0.25"/>
  <circle cx="120" cy="350" r="7" fill="#F0CB46" opacity="0.25"/>
</svg>
